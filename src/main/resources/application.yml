spring:
  application:
    name: QuizApp
  sql:
    init:
      mode: always
      continue-on-error: true
      data-locations: classpath:data.sql
  security:
    user:
      name: test
      password: test

  datasource:
    url: jdbc:postgresql://localhost:5432/quizdb
    username: quiz_user
    password: quiz_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true